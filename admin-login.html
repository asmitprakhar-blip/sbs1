<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Startup Business Summit 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="assets/css/sbs-theme.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase.js"></script>
    <style>
        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0c1a30 0%, #030810 90%);
            color: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, #7f00ff, #0072ff);
            border-radius: 26px;
            z-index: -1;
            opacity: 0.15;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-container img {
            max-width: 140px;
        }

        .logo-container h2 {
            font-size: 24px;
            font-weight: 800;
            margin: 16px 0 6px 0;
            background: linear-gradient(90deg, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-container p {
            color: #64748b;
            font-size: 14px;
            margin: 0;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 13.5px;
            color: #94a3b8;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            box-sizing: border-box;
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 14px 16px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #0072ff;
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 12px rgba(0, 114, 255, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 30px;
            border: none;
            background: linear-gradient(90deg, #7f00ff, #0072ff) !important;
            color: #ffffff !important;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 114, 255, 0.2);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 114, 255, 0.4);
        }

        .login-btn:disabled {
            background: #475569 !important;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .alert-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 24px;
            display: none;
        }

        .footer-note {
            text-align: center;
            font-size: 12px;
            color: #475569;
            margin-top: 32px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-container">
            <img src="assets/images/sbs_logo.png" alt="Summit Logo">
            <h2>Summit Organiser Panel</h2>
            <p>Enter your admin credentials to login</p>
        </div>

        <div id="errorAlert" class="alert-box"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="admin@sbs2026.org" required autocomplete="username">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" id="submitBtn" class="login-btn">Authenticate Admin Session</button>
        </form>

        <p class="footer-note">© 2026 Startup Business Summit. Authorized personnel only.</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const client = window.supabaseClient;
            if (!client) {
                showError("Supabase library initialization error. Check console logs.");
                return;
            }

            // Redirect if already authenticated
            const { data: { session } } = await client.auth.getSession();
            if (session) {
                window.location.href = 'admin.html';
            }

            const loginForm = document.getElementById('loginForm');
            const submitBtn = document.getElementById('submitBtn');
            const errorAlert = document.getElementById('errorAlert');

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorAlert.style.display = 'none';
                submitBtn.disabled = true;
                submitBtn.innerText = 'Verifying credentials...';

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();

                try {
                    const { data, error } = await client.auth.signInWithPassword({
                        email,
                        password
                    });

                    if (error) throw error;

                    // Fetch profile to verify profile registration
                    const { data: profile, error: profileError } = await client
                        .from('user_profiles')
                        .select('role')
                        .eq('id', data.user.id)
                        .single();

                    if (profileError || !profile) {
                        // Create default user profile if none exists
                        await client.from('user_profiles').upsert([{
                            id: data.user.id,
                            role: 'Operations Team',
                            full_name: email.split('@')[0]
                        }]);
                    }

                    // Success Redirect
                    window.location.href = 'admin.html';
                } catch (err) {
                    showError(err.message || 'Authentication failed. Please verify credentials.');
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Authenticate Admin Session';
                }
            });

            function showError(msg) {
                errorAlert.innerText = msg;
                errorAlert.style.display = 'block';
            }
        });
    </script>
</body>
</html>
