<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Startup Business Summit 2026</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS Style Setup -->
    <style>
        :root {
            --bg-color: #030712;
            --card-bg: #0b0f19;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --border: #1f2937;
            --input-bg: #111827;
            --error: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background-image: radial-gradient(circle at top left, rgba(99, 102, 241, 0.15), transparent 40%),
                              radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.1), transparent 40%);
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            display: inline-block;
        }

        .title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
        }

        .label {
            font-size: 13px;
            font-weight: 500;
            color: #d1d5db;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i.field-icon {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
            font-size: 15px;
        }

        .input-wrapper .show-pwd-btn {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 15px;
            transition: color 0.2s;
        }

        .input-wrapper .show-pwd-btn:hover {
            color: var(--text-main);
        }

        .input {
            width: 100%;
            padding: 12px 14px 12px 40px;
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 24px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-muted);
            user-select: none;
        }

        .checkbox-container input {
            accent-color: var(--primary);
        }

        .forgot-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        /* Buttons */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        .btn-submit:disabled {
            background-color: #3730a3;
            color: #a5b4fc;
            cursor: not-allowed;
        }

        .footer-link {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 24px;
        }

        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }

        /* Toast notifications system */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 400px;
            width: 100%;
        }

        .toast {
            background: #111827;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            color: var(--text-main);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease-out forwards;
            position: relative;
            overflow: hidden;
        }

        .toast::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            width: 100%;
            animation: progress 4s linear forwards;
        }

        .toast.toast-error::after { background-color: var(--error); }
        .toast.toast-success::after { background-color: var(--success); }
        .toast.toast-warning::after { background-color: var(--warning); }

        .toast.toast-error i { color: var(--error); }
        .toast.toast-success i { color: var(--success); }
        .toast.toast-warning i { color: var(--warning); }

        @keyframes slideIn {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes progress {
            from { width: 100%; }
            to { width: 0%; }
        }

        /* Spinner */
        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top: 2px solid white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="header">
            <span class="logo"><i class="fa-solid fa-rocket"></i> Startup Summit</span>
            <h1 class="title">Welcome back</h1>
            <p class="subtitle">Log in to your account to continue</p>
        </div>

        <form id="login-form">
            <!-- Email Address -->
            <div class="form-group">
                <label class="label">Email Address</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-envelope field-icon"></i>
                    <input type="email" id="email" class="input" placeholder="john@company.com" required>
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label class="label">Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock field-icon"></i>
                    <input type="password" id="password" class="input" placeholder="••••••••" required>
                    <button type="button" class="show-pwd-btn" onclick="togglePassword('password', this)">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Options -->
            <div class="form-options">
                <label class="checkbox-container">
                    <input type="checkbox" id="remember-me">
                    Remember me
                </label>
                <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="btn-submit" class="btn-submit">
                <span>Log In</span>
            </button>
        </form>

        <div class="footer-link">
            Don't have an account? <a href="register-account.html">Sign up</a>
        </div>
    </div>

    <!-- Toast notifications -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Scripts setup -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/auth.js"></script>

    <script>
        // Redirect if already logged in
        document.addEventListener('DOMContentLoaded', async () => {
            if (window.authAPI) {
                await window.authAPI.redirectIfAuthorized();
            }
        });

        // Toggle Password Show/Hide
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // Show Toast Banners
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            
            let icon = 'fa-circle-check';
            if (type === 'error') icon = 'fa-triangle-exclamation';
            if (type === 'warning') icon = 'fa-circle-info';
            
            toast.innerHTML = `
                <i class="fa-solid ${icon}"></i>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s ease-out reverse';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // Form Submit Handler
        const form = document.getElementById('login-form');
        const submitBtn = document.getElementById('btn-submit');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('remember-me').checked;

            if (!window.supabaseClient) {
                showToast("Supabase client is not loaded correctly.", "error");
                return;
            }

            // Set session persistence configuration based on Remember Me option
            if (rememberMe) {
                // Default local storage persistence is handled by Supabase JS client
            }

            // Enter loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<div class="spinner"></div> <span>Logging in...</span>`;

            try {
                const { data, error } = await window.supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                showToast("Login successful! Redirecting...", "success");

                // Get User Profile to verify confirmation status
                if (window.authAPI) {
                    const profile = await window.authAPI.getUserProfile(data.user.id);
                    
                    setTimeout(() => {
                        if (profile) {
                            if (!profile.is_verified) {
                                window.location.href = `verify-email.html?email=${encodeURIComponent(email)}`;
                            } else {
                                const dashboard = window.authAPI.ROLE_DASHBOARD_MAP[profile.role] || 'attendee-dashboard.html';
                                window.location.href = dashboard;
                            }
                        } else {
                            window.location.href = 'login.html';
                        }
                    }, 1500);
                } else {
                    window.location.href = 'index.html';
                }

            } catch (err) {
                console.error("Login error:", err);
                showToast(err.message || "Invalid login credentials. Please try again.", "error");
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<span>Log In</span>`;
            }
        });
    </script>
</body>
</html>
