<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Startup Business Summit 2026</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS Style Setup -->
    <style>
        :root {
            --bg-color: #030712;
            --card-bg: #0b0f19;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --border: #1f2937;
            --input-bg: #111827;
            --error: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background-image: radial-gradient(circle at top left, rgba(99, 102, 241, 0.15), transparent 40%),
                              radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.1), transparent 40%);
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            display: inline-block;
        }

        .title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 24px;
        }

        .label {
            font-size: 13px;
            font-weight: 500;
            color: #d1d5db;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i.field-icon {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
            font-size: 15px;
        }

        .input {
            width: 100%;
            padding: 12px 14px 12px 40px;
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        /* Buttons */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        .btn-submit:disabled {
            background-color: #3730a3;
            color: #a5b4fc;
            cursor: not-allowed;
        }

        .footer-link {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 24px;
        }

        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }

        /* Success screen configuration */
        .success-card {
            display: none;
            text-align: center;
            animation: fadeIn 0.4s ease-out;
        }

        .success-icon {
            font-size: 48px;
            color: var(--success);
            margin-bottom: 18px;
        }

        .success-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .success-desc {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 24px;
        }

        /* Toast notifications system */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 400px;
            width: 100%;
        }

        .toast {
            background: #111827;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            color: var(--text-main);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease-out forwards;
            position: relative;
            overflow: hidden;
        }

        .toast::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            width: 100%;
            animation: progress 4s linear forwards;
        }

        .toast.toast-error::after { background-color: var(--error); }
        .toast.toast-success::after { background-color: var(--success); }
        .toast.toast-warning::after { background-color: var(--warning); }

        .toast.toast-error i { color: var(--error); }
        .toast.toast-success i { color: var(--success); }
        .toast.toast-warning i { color: var(--warning); }

        @keyframes slideIn {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes progress {
            from { width: 100%; }
            to { width: 0%; }
        }

        /* Spinner */
        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top: 2px solid white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <!-- Recovery Request Form -->
        <div id="recovery-form-view">
            <div class="header">
                <span class="logo"><i class="fa-solid fa-rocket"></i> Startup Summit</span>
                <h1 class="title">Reset your password</h1>
                <p class="subtitle">Enter your email address and we'll send you a link to reset your password.</p>
            </div>

            <form id="forgot-form">
                <!-- Email Address -->
                <div class="form-group">
                    <label class="label">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope field-icon"></i>
                        <input type="email" id="email" class="input" placeholder="john@company.com" required>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="btn-submit" class="btn-submit">
                    <span>Send Reset Link</span>
                </button>
            </form>

            <div class="footer-link">
                Remember your password? <a href="login.html">Log in</a>
            </div>
        </div>

        <!-- Success Confirmation View -->
        <div id="success-view" class="success-card">
            <div class="success-icon">
                <i class="fa-regular fa-circle-check"></i>
            </div>
            <h2 class="success-title">Check your email</h2>
            <p class="success-desc">
                We've sent a password reset link to <strong id="sent-email-lbl">your email</strong>. Please follow the instructions to reset your password.
            </p>
            <button onclick="window.location.href='login.html'" class="btn-submit" style="background-color: var(--input-bg); border: 1px solid var(--border);">
                <span>Back to Log In</span>
            </button>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Scripts setup -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/auth.js"></script>

    <script>
        // Redirect if already logged in
        document.addEventListener('DOMContentLoaded', async () => {
            if (window.authAPI) {
                await window.authAPI.redirectIfAuthorized();
            }
        });

        // Show Toast Banners
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            
            let icon = 'fa-circle-check';
            if (type === 'error') icon = 'fa-triangle-exclamation';
            if (type === 'warning') icon = 'fa-circle-info';
            
            toast.innerHTML = `
                <i class="fa-solid ${icon}"></i>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s ease-out reverse';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // Form Submit Handler
        const forgotForm = document.getElementById('forgot-form');
        const submitBtn = document.getElementById('btn-submit');
        const formView = document.getElementById('recovery-form-view');
        const successView = document.getElementById('success-view');
        const sentEmailLbl = document.getElementById('sent-email-lbl');

        forgotForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim().toLowerCase();

            if (!window.supabaseClient) {
                showToast("Supabase client not loaded.", "error");
                return;
            }

            // Enter loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<div class="spinner"></div> <span>Sending link...</span>`;

            try {
                const { error } = await window.supabaseClient.auth.resetPasswordForEmail(email, {
                    redirectTo: `${window.location.origin}/reset-password.html`
                });

                if (error) throw error;

                // Show success screen
                sentEmailLbl.innerText = email;
                formView.style.display = 'none';
                successView.style.display = 'block';

            } catch (err) {
                console.error("Password reset error:", err);
                showToast(err.message || "An error occurred while requesting password reset.", "error");
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<span>Send Reset Link</span>`;
            }
        });
    </script>
</body>
</html>
